name: youhelp-dev

services:
  mongo:
    container_name: youhelp_mongo_dev
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    networks:
      - youhelp_network
    restart: unless-stopped

  api:
    container_name: youhelp_api_dev
    build:
      context: ./back-end
      dockerfile: Dockerfile
      target: development
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/YouHelp
      JWT_SECRET: ${JWT_SECRET:-change_this_for_real_usage}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./back-end:/app
      - /app/node_modules
    networks:
      - youhelp_network
    depends_on:
      - mongo
    restart: unless-stopped

  web:
    container_name: youhelp_frontend_dev
    build:
      context: ./front-end
      dockerfile: Dockerfile
      target: development
      args:
        VITE_API__BASE: http://localhost:3000
    environment:
      VITE_API__BASE: http://localhost:3000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - youhelp_network
    restart: unless-stopped

networks:
  youhelp_network:
    driver: bridge

volumes:
  mongo_data_dev:
