name: youhelp

services:
  mongo:
    container_name: youhelp_mongo
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - youhelp_network
    restart: unless-stopped

  api:
    container_name: youhelp_api
    build:
      context: ./back-end
      dockerfile: Dockerfile
      target: production
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/YouHelp
      JWT_SECRET: ${JWT_SECRET:-change_this_for_real_usage}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    networks:
      - youhelp_network
    restart: unless-stopped
    depends_on:
      - mongo
    volumes:
      - backend_uploads:/app/src/uploads

  web:
    container_name: youhelp_frontend
    build:
      context: ./front-end
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API__BASE: http://localhost:3000
    ports:
      - "5173:5173"
    networks:
      - youhelp_network
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

networks:
  youhelp_network:
    driver: bridge

volumes:
  mongo_data:
  backend_uploads: