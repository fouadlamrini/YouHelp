name: lms

services:
  api:
    container_name: lms_api
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - ./apps/api/.env.production
    ports:
      - "3001:3001"
    networks:
      - lms_network
    restart: unless-stopped
    # PERSISTENCE: Save your uploads outside the container
    volumes:
      - lms_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  web:
    container_name: lms_web
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file:
      - ./apps/web/.env.production
    ports:
      - "3000:3000"
    networks:
      - lms_network
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

networks:
  lms_network:
    driver: bridge

# Named volume for uploads
volumes:
  lms_uploads: